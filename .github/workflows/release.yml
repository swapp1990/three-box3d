# Changesets release automation. Run manually with pending changesets to
# open/update a "Version Packages" PR; run again after that PR merges to
# publish the three packages (they version together via the `fixed` group in
# .changeset/config.json).
#
# DORMANT until the v0.1.0 launch — manual dispatch only, so main never gets
# a red X from release plumbing before we ship. To go live at launch:
#   1. add the NPM_TOKEN repository secret,
#   2. enable "Allow GitHub Actions to create and approve pull requests"
#      (Settings → Actions → General → Workflow permissions) — without it the
#      version-PR step fails with an HttpError,
#   3. restore the `push: branches: [main]` trigger.
name: release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets/action pushes the version PR branch
      pull-requests: write # …and opens/updates the PR
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs history to compute changed packages

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          # `npm run release` = build all packages, then `changeset publish`.
          publish: npm run release
          version: npm run version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
